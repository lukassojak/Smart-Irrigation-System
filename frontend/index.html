<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="sis-logo-v1.2.6.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content">

    <meta name="theme-color" content="#319795">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default">
    <meta
        name="apple-mobile-web-app-title"
        content="SIS">

    <title>Smart Irrigation System</title>
    <style>
      /* Minimal inline loader styles to show immediately on startup */
      #app-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1724;color:#e6eef8;z-index:9999}
      .loader__inner{display:flex;flex-direction:column;align-items:center;gap:12px}
      .loader__text{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size:14px;opacity:0.95}
      .loader__spinner{width:40px;height:40px;animation:spin 1s linear infinite;stroke:currentColor;stroke-width:2;fill:none}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <div class="loader__inner">
        <svg class="loader__spinner" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke-opacity="0.16"></circle>
          <path d="M21 12a9 9 0 0 0-9-9" stroke-linecap="round"></path>
        </svg>
        <span class="loader__text">Aplikace se načítá…</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
